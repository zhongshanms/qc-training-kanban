<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>质检培训看板 · 门锁 / 灯饰 / 导轨</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛠️</text></svg>">
<style>
:root{
  --bg:#f5f7fa; --card:#fff; --ink:#1f2937; --muted:#6b7280;
  --line:#e5e7eb; --primary:#2563eb; --accent:#0d9488;
  --ok:#16a34a; --warn:#d97706; --bad:#dc2626;
  --radius:14px; --shadow:0 1px 3px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.04);
}
*{box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  margin:0;font-family:"Microsoft YaHei","PingFang SC","Segoe UI",system-ui,sans-serif;
  background:var(--bg);color:var(--ink);line-height:1.6;
}
/* ===== topbar ===== */
.topbar{
  position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:24px;
  padding:0 24px;height:64px;background:rgba(255,255,255,.92);
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:12px;flex-shrink:0}
.logo{font-size:26px}
.brand-text h1{font-size:17px;margin:0;letter-spacing:.5px}
.brand-text .sub{font-size:12px;color:var(--muted)}
.tabs{
  display:flex;gap:4px;
  flex:1;min-width:0;
  overflow-x:auto;overflow-y:hidden;
  scrollbar-width:none;-ms-overflow-style:none;
  padding:4px 0;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;
  padding:8px 16px;border-radius:999px;text-decoration:none;color:var(--muted);
  font-size:14px;font-weight:600;transition:.15s;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.tab:hover{background:#eef2f7;color:var(--ink)}
.tab.active{background:var(--primary);color:#fff;box-shadow:0 4px 12px rgba(37,99,235,.3)}
.search{flex-shrink:0;margin-left:auto}
.search input{
  width:230px;padding:8px 14px;border:1px solid var(--line);border-radius:999px;
  font-size:14px;outline:none;background:#fff;transition:.15s;
}
.search input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12)}

/* ===== main view ===== */
.view{max-width:1180px;margin:0 auto;padding:28px 24px 80px;min-height:calc(100vh - 64px)}

/* ===== footer ===== */
.footer{
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;
  padding:18px 24px;border-top:1px solid var(--line);color:var(--muted);
  font-size:12px;background:#fff;
}

/* ===== page head ===== */
.page-head{margin-bottom:24px}
.page-head h2{margin:0 0 6px;font-size:26px;display:flex;align-items:center;gap:10px}
.page-head p{margin:0;color:var(--muted);font-size:14px}
.crumbs{font-size:12px;color:var(--muted);margin-bottom:10px}
.crumbs a{color:var(--primary);text-decoration:none}

/* ===== card ===== */
.card{
  background:var(--card);border-radius:var(--radius);padding:22px 24px;
  box-shadow:var(--shadow);margin-bottom:20px;border:1px solid var(--line);
}
.card-title{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.card-title h3{margin:0;font-size:18px}
.card-title .src{font-size:11px;color:var(--muted);background:#f3f4f6;padding:3px 9px;border-radius:6px;white-space:nowrap}
.note{font-size:13px;color:var(--muted);margin:-4px 0 16px}

/* ===== table ===== */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:0 -4px;padding:0 4px}
table{width:100%;border-collapse:collapse;font-size:14px;table-layout:fixed;min-width:480px}
th,td{text-align:left;padding:11px 15px;border-bottom:1px solid var(--line);vertical-align:top;word-break:break-word}
th{background:#f9fafb;font-weight:600;color:#374151;position:sticky;top:0}
tbody tr:hover{background:#fafbfc}
table.col2 th:first-child,table.col2 td:first-child{width:42%}
table.col2 th:last-child,table.col2 td:last-child{width:58%}
td.num,th.num{width:54px;text-align:center;color:var(--muted);font-variant-numeric:tabular-nums}
.mono{font-family:Consolas,"Courier New",monospace}
pre.cell{white-space:pre-wrap;margin:0;font-family:inherit;font-size:14px}

/* ===== badges ===== */
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:12px;font-weight:600}
.b-crit{background:#fee2e2;color:#b91c1c}
.b-main{background:#ffedd5;color:#c2410c}
.b-min{background:#dcfce7;color:#15803d}

/* ===== logic ===== */
.logic-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;margin-bottom:18px}
.logic-card{border:1px solid var(--line);border-radius:10px;padding:14px;background:#fff}
.logic-card.single{border-left:4px solid var(--primary)}
.logic-card.master{border-left:4px solid var(--warn)}
.logic-card .lbl{font-size:12px;color:var(--muted);margin-bottom:8px}
.logic-card .skus{display:flex;flex-wrap:wrap;gap:6px}
.logic-card .sku{font-family:Consolas,monospace;background:#f3f4f6;padding:3px 8px;border-radius:5px;font-size:13px}
.rules{background:#eff6ff;border-radius:10px;padding:16px 20px;border-left:4px solid var(--primary)}
.rules ol{margin:0;padding-left:20px}
.rules li{margin-bottom:6px;font-size:14px}

/* ===== compare ===== */
.cmp{display:grid;grid-template-columns:120px 1fr 1fr;gap:0;border:1px solid var(--line);border-radius:10px;overflow:hidden}
.cmp .h{background:#f9fafb;font-weight:600;padding:10px 14px;border-bottom:1px solid var(--line);text-align:center}
.cmp .item{font-weight:600;padding:12px 14px;border-bottom:1px solid var(--line);border-right:1px solid var(--line);background:#fafbfc}
.cmp .cell{padding:12px 14px;border-bottom:1px solid var(--line)}
.cmp .cell.us{border-right:1px solid var(--line)}
.cmp .cell.us,.cmp .cell.us pre.cell{color:#1d4ed8}
.cmp .cell.eu,.cmp .cell.eu pre.cell{color:#b45309}
.cmp .row:last-child>*{border-bottom:none}
.cmp-flag{display:inline-flex;align-items:center;gap:6px;font-weight:600;font-size:13px}
.flag-us{color:#1d4ed8}.flag-eu{color:#b45309}
.footer-note{margin-top:14px;background:#fef3c7;border-radius:8px;padding:12px 16px;font-size:13px;color:#92400e}

/* ===== grade ===== */
.grade{border-left:6px solid var(--bad);border-radius:0 10px 10px 0;padding:18px 22px;margin-bottom:16px;background:#fff;border:1px solid var(--line);border-left-width:6px}
.grade.main{border-left-color:var(--warn)}
.grade.min{border-left-color:var(--ok)}
.grade h4{margin:0 0 4px;font-size:17px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.grade .rate{font-weight:600;color:#374151;font-size:13px;margin-bottom:10px}
.grade dl{margin:6px 0 0;display:grid;grid-template-columns:88px 1fr;gap:6px 12px;font-size:14px}
.grade dt{color:var(--muted);font-weight:600}
.grade dd{margin:0}

/* ===== doc ===== */
.doc-block{margin-bottom:20px}
.doc-block h4{font-size:17px;margin:0 0 8px;color:var(--primary);border-left:4px solid var(--primary);padding-left:10px}
.doc-block h5{font-size:15px;margin:14px 0 6px;color:#374151}
.doc-block p{margin:0 0 8px;font-size:14px}
.doc-block ul{margin:0 0 8px;padding-left:22px}
.doc-block li{margin-bottom:5px;font-size:14px}
.kv{display:grid;grid-template-columns:130px 1fr;gap:8px 14px;background:#f9fafb;border-radius:8px;padding:14px 18px;margin:6px 0}
.kv .k{color:var(--muted);font-weight:600}

/* ===== home ===== */
.hero{text-align:center;padding:40px 20px 30px}
.hero .big{font-size:30px;font-weight:800;margin:0 0 10px}
.hero .lead{color:var(--muted);font-size:15px;max-width:640px;margin:0 auto}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:18px;margin-top:30px}
.cat-card{
  text-decoration:none;color:inherit;background:var(--card);border:1px solid var(--line);
  border-radius:var(--radius);padding:24px;box-shadow:var(--shadow);transition:.18s;
  display:block;position:relative;overflow:hidden;
}
.cat-card:hover{transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.1)}
.cat-card .ic{font-size:38px;margin-bottom:12px;display:block}
.cat-card h3{margin:0 0 6px;font-size:18px}
.cat-card p{margin:0;color:var(--muted);font-size:13px}
.cat-card .tag{position:absolute;top:16px;right:16px;width:10px;height:10px;border-radius:50%}
.stat-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-top:26px}
.stat{background:#fff;border:1px solid var(--line);border-radius:10px;padding:16px;text-align:center}
.stat .n{font-size:24px;font-weight:800}
.stat .l{font-size:12px;color:var(--muted);margin-top:2px}

/* ===== search highlight ===== */
mark{background:#fde68a;border-radius:3px;padding:0 2px}
.hidden{display:none!important}

/* ===== responsive: 平板及以下 ===== */
@media(max-width:820px){
  .topbar{
    height:auto;padding:10px 14px;gap:10px;
    flex-wrap:wrap;
  }
  .tabs{
    order:3;width:100%;flex:none;
    gap:6px;padding:2px 0;
  }
  .tab{padding:7px 14px;font-size:13px}
  .brand-text .sub{display:none}
  .search{margin-left:auto;order:2}
  .search input{width:140px}
  .view{padding:18px 14px 60px}

  /* table: 移除最小宽度限制，让小表格正常显示 */
  table{min-width:auto;font-size:13px}
  th,td{padding:9px 10px}

  /* compare */
  .cmp{grid-template-columns:1fr}
  .cmp .item{border-right:none}
  .cmp .cell.us{border-right:none;border-bottom:1px solid var(--line)}

  /* grade */
  .grade dl{grid-template-columns:1fr}
  .grade{padding:14px 16px}

  /* kv */
  .kv{grid-template-columns:1fr}

  /* page head */
  .page-head h2{font-size:22px}
  .hero .big{font-size:26px}
  .hero{padding:30px 14px 20px}
}

/* ===== responsive: 手机 ===== */
@media(max-width:520px){
  .topbar{padding:8px 10px;gap:8px}
  .brand{gap:8px}
  .brand-text h1{font-size:15px}
  .logo{font-size:22px}
  .tab{padding:6px 12px;font-size:12px}
  .search input{width:100%;min-width:80px;font-size:13px}
  .view{padding:14px 10px 50px}

  /* card */
  .card{padding:16px 14px;border-radius:12px}
  .card-title h3{font-size:16px}

  /* table */
  th,td{padding:7px 8px;font-size:12px}
  pre.cell{font-size:12px}

  /* logic */
  .logic-grid{grid-template-columns:1fr;gap:10px}
  .logic-card{padding:12px}

  /* home */
  .hero{padding:24px 10px 16px}
  .hero .big{font-size:22px}
  .hero .lead{font-size:13px}
  .cat-grid{grid-template-columns:1fr;gap:12px}
  .cat-card{padding:18px}
  .cat-card .ic{font-size:30px}
  .stat-row{grid-template-columns:repeat(3,1fr);gap:10px}
  .stat{padding:12px 8px}
  .stat .n{font-size:20px}

  /* compare */
  .cmp .h{padding:8px 10px;font-size:12px}
  .cmp .item,.cmp .cell{padding:10px;font-size:13px}

  /* grade */
  .grade h4{font-size:15px}

  /* doc */
  .doc-block h4{font-size:15px}
  .doc-block p,.doc-block li{font-size:13px}
  .kv{padding:10px 14px;font-size:13px}
  .kv .k{font-size:13px}

  /* rules */
  .rules{padding:12px 14px}
  .rules li{font-size:13px}

  /* footer */
  .footer{flex-direction:column;text-align:center;gap:4px;padding:14px 10px;font-size:11px}
}

/* ===== responsive: 极小屏 ===== */
@media(max-width:380px){
  .brand-text .sub{display:none}
  .stat-row{grid-template-columns:repeat(2,1fr)}
  .topbar{gap:6px}
  .search input{min-width:70px;padding:6px 10px}
  .tabs{gap:4px}
  .tab{padding:5px 10px;font-size:11px}
}

</style>
</head>
<body>
<header class="topbar">
  <div class="brand">
    <span class="logo">🛠️</span>
    <div class="brand-text">
      <h1>质检培训看板</h1>
      <span class="sub">门锁 · 灯饰 · 导轨 · 通用判定标准</span>
    </div>
  </div>
  <nav class="tabs">
    <a href="#/home" class="tab" data-route="home">首页</a>
    <a href="#/lock" class="tab" data-route="lock">门锁</a>
    <a href="#/light" class="tab" data-route="light">灯饰</a>
    <a href="#/track" class="tab" data-route="track">导轨</a>
    <a href="#/standard" class="tab" data-route="standard">通用标准</a>
  </nav>
  <div class="search">
    <input id="searchBox" type="search" placeholder="🔍 搜索检查项 / 标准 / SKU…" autocomplete="off">
  </div>
</header>

<main id="view" class="view"></main>

<footer class="footer">
  <span>质检培训看板 <span id="ver"></span></span>
  <span>内容源自内部质检 SOP 与判定标准，仅供培训学习</span>
</footer>

<script>

      }

  // ============ 灯饰 ============

          { h: "三、职责分工", list: [

          ]},
          { h: "四、工具与设备准备", table: {
            headers: ["序号", "工具 / 设备名称", "规格要求", "用途"],

/* app.js — 质检培训看板前端逻辑（纯客户端 SPA） */
(function () {
  "use strict";
  const D = window.QC_DATA;
  const view = document.getElementById("view");
  const verEl = document.getElementById("ver");

  const esc = (s) =>
    String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");

  // 把单元格文本（含 \n）渲染为 <pre>；支持搜索高亮
  function cell(text, q) {
    let t = esc(text);
    if (q) {
      const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
      t = t.replace(re, "<mark>$1</mark>");
    }
    return '<pre class="cell">' + t.replace(/\n/g, "<br>") + "</pre>";
  }

  function src(tag) {
    return tag ? '<span class="src">' + esc(tag) + "</span>" : "";
  }

  // ---- 渲染各 section 类型 ----
  function renderTable(s, q) {
    let rows = s.rows
      .map((r, i) => {
        const tds = r
          .map((c, ci) => "<td" + (ci === 0 ? ' class="num"' : "") + ">" + cell(c, q) + "</td>")
          .join("");
        return "<tr>" + tds + "</tr>";
      })
      .join("");
    const ths = s.headers
      .map((h, i) => "<th" + (i === 0 ? ' class="num"' : "") + ">" + esc(h) + "</th>")
      .join("");
    const cls = s.headers.length === 2 ? ' class="col2"' : "";
    return (
      '<section class="card"><div class="card-title"><h3>' +
      esc(s.title) + "</h3>" + src(s.source) +
      '</div>' + (s.note ? '<p class="note">' + esc(s.note) + "</p>" : "") +
      '<div class="table-wrap"><table' + cls + '><thead><tr>' + ths +
      '</tr></thead><tbody>' + rows + "</tbody></table></div></section>"
    );
  }

  function renderLogic(s, q) {
    const cards = s.examples
      .map((e) => {
        const isMaster = /通开/.test(e.label);
        const skus = e.vals
          .map((v) => '<span class="sku">' + cell(v, q) + "</span>")
          .join("");
        return (
          '<div class="logic-card ' + (isMaster ? "master" : "single") + '"><div class="lbl">' +
          esc(e.label) + '</div><div class="skus">' + skus + "</div></div>"
        );
      })
      .join("");
    const rules = s.rules
      .map((r) => "<li>" + cell(r, q) + "</li>")
      .join("");
    return (
      '<section class="card"><div class="card-title"><h3>' + esc(s.title) +
      "</h3>" + src(s.source) + '</div><div class="logic-grid">' + cards +
      '</div><div class="rules"><ol>' + rules + "</ol></div></section>"
    );
  }

  function renderCompare(s, q) {
    const rows = s.pairs
      .map((p) => {
        return (
          '<div class="row" style="display:contents">' +
          '<div class="item">' + esc(p.item) + "</div>" +
          '<div class="cell us">' + cell(p.us, q) + "</div>" +
          '<div class="cell eu">' + cell(p.eu, q) + "</div>" +
          "</div>"
        );
      })
      .join("");
    return (
      '<section class="card"><div class="card-title"><h3>' + esc(s.title) +
      "</h3>" + src(s.source) + '</div>' + (s.note ? '<p class="note">' + esc(s.note) + "</p>" : "") +
      '<div class="cmp"><div class="h"></div>' +
      '<div class="h"><span class="cmp-flag flag-us">🇺🇸 美国标准</span></div>' +
      '<div class="h"><span class="cmp-flag flag-eu">🇪🇺 欧洲标准</span></div>' +
      rows + "</div>" +
      (s.footer ? '<div class="footer-note">⚙️ ' + esc(s.footer) + "</div>" : "") +
      "</section>"
    );
  }

  function renderGrade(s) {
    const colors = { "关键缺陷": "", "主要缺陷": "main", "次要缺陷": "min" };
    const badges = { "关键缺陷": "b-crit", "主要缺陷": "b-main", "次要缺陷": "b-min" };
    const blocks = s.grades
      .map((g) => {
        const cls = colors[g.level] || "";
        return (
          '<div class="grade ' + cls + '"><h4><span class="badge ' +
          badges[g.level] + '">' + esc(g.level) + "</span></h4>" +
          '<div class="rate">📊 ' + esc(g.rate) + "</div>" +
          "<dl><dt>定义</dt><dd>" + esc(g.define) + "</dd>" +
          "<dt>快速判断</dt><dd>" + esc(g.quick) + "</dd>" +
          "<dt>具体表现</dt><dd>" + esc(g.detail) + "</dd></dl></div>"
        );
      })
      .join("");
    return (
      '<section class="card"><div class="card-title"><h3>' + esc(s.title) +
      "</h3>" + src(s.source) + "</div>" + blocks + "</section>"
    );
  }

  function renderDoc(s) {
    const blocks = s.doc
      .map((b) => {
        let inner = "";
        if (b.p) inner += "<p>" + esc(b.p) + "</p>";
        if (b.kv) {
          inner += '<div class="kv">' + b.kv.map((k) =>
            '<div class="k">' + esc(k[0]) + "</div><div>" + esc(k[1]) + "</div>").join("") + "</div>";
        }
        if (b.list) {
          inner += "<ul>" + b.list.map((x) => "<li>" + esc(x) + "</li>").join("") + "</ul>";
        }
        if (b.table) {
          const cls = b.table.headers.length === 2 ? ' class="col2"' : "";
          const ths = b.table.headers.map((h) => "<th>" + esc(h) + "</th>").join("");
          const trs = b.table.rows.map((r) =>
            "<tr>" + r.map((c) => "<td>" + esc(c) + "</td>").join("") + "</tr>").join("");
          inner += '<div class="table-wrap"><table' + cls + '><thead><tr>' + ths +
            '</tr></thead><tbody>' + trs + "</tbody></table></div>";
        }
        const head = b.h
          ? '<h4>' + esc(b.h) + "</h4>"
          : b.sub ? '<h5>' + esc(b.sub) + "</h5>" : "";
        return '<div class="doc-block">' + head + inner + "</div>";
      })
      .join("");
    return (
      '<section class="card"><div class="card-title"><h3>' + esc(s.title) +
      "</h3>" + src(s.source) + "</div>" + blocks + "</section>"
    );
  }

  function renderSection(s, q) {
    switch (s.type) {
      case "table": return renderTable(s, q);
      case "logic": return renderLogic(s, q);
      case "compare": return renderCompare(s, q);
      case "grade": return renderGrade(s);
      case "doc": return renderDoc(s);
      default: return "";
    }
  }

  // ---- 页面 ----
  function categoryPage(key) {
    const cat = D[key];
    const html =
      '<div class="crumbs"><a href="#/home">首页</a> / ' + esc(cat.title) + "</div>" +
      '<div class="page-head"><h2>🛠️ ' + esc(cat.title) +
      '</h2><p>共 ' + cat.sections.length + " 个板块 · 内容依据内部 SOP 整理</p></div>" +
      cat.sections.map((s) => renderSection(s)).join("");
    view.innerHTML = html;
    document.title = cat.title + " · 质检培训看板";
  }

  function standardPage() { categoryPage("standard"); }

  function homePage() {
    const cats = [
      { key: "lock", ic: "🔒", desc: "基础质检8项 · 单开/通开识别" },
      { key: "light", ic: "💡", desc: "欧美规区别 · 摔箱测试SOP" },
      { key: "track", ic: "🛤️", desc: "外观/尺寸/包装/功能/配件" },
      { key: "standard", ic: "📋", desc: "缺陷分级 · 异常处理 · 拍照标准" }
    ];
    const cards = cats
      .map((c) => {
        const cat = D[c.key];
        return (
          '<a class="cat-card" href="#/' + c.key + '"><span class="tag" style="background:' +
          cat.color + '"></span><span class="ic">' + c.ic + "</span><h3>" +
          esc(cat.title) + "</h3><p>" + esc(c.desc) + "</p></a>"
        );
      })
      .join("");
    const stats =
      '<div class="stat"><div class="n">8</div><div class="l">门锁质检项</div></div>' +
      '<div class="stat"><div class="n">7</div><div class="l">欧美规对比项</div></div>' +
      '<div class="stat"><div class="n">9</div><div class="l">摔箱测试章节</div></div>' +
      '<div class="stat"><div class="n">5</div><div class="l">导轨质检项</div></div>' +
      '<div class="stat"><div class="n">3</div><div class="l">缺陷分级</div></div>';
    view.innerHTML =
      '<div class="hero"><p class="big">质检员培训学习看板</p><p class="lead">' +
      "按 <b>门锁 · 灯饰 · 导轨</b> 三大品类分类，附通用判定标准。所有内容直接来自内部 SOP，" +
      "可随时检索查阅，建议生产/质检现场参考使用。</p></div>" +
      '<div class="cat-grid">' + cards + "</div>" +
      '<div class="stat-row">' + stats + "</div>";
    document.title = "质检培训看板 · 门锁 / 灯饰 / 导轨";
  }

  // ---- 搜索（跨全部品类） ----
  function searchPage(q) {
    const ql = q.toLowerCase();
    const cats = [
      { key: "lock", ic: "🔒" },
      { key: "light", ic: "💡" },
      { key: "track", ic: "🛤️" },
      { key: "standard", ic: "📋" }
    ];
    let hits = [];
    cats.forEach((c) => {
      D[c.key].sections.forEach((s) => {
        const collect = (text, ctx) => {
          if (text && String(text).toLowerCase().includes(ql)) {
            hits.push({ cat: c, sec: s, ctx: ctx || s.title, text: String(text) });
          }
        };
        if (s.rows) s.rows.forEach((r) => r.forEach((x) => collect(x, s.title)));
        if (s.pairs) s.pairs.forEach((p) => { collect(p.us, p.item + "（美国）"); collect(p.eu, p.item + "（欧洲）"); collect(p.item, "对比项"); });
        if (s.examples) s.examples.forEach((e) => { e.vals.forEach((v) => collect(v, e.label)); collect(e.label, "标签"); });
        if (s.rules) s.rules.forEach((r) => collect(r, s.title + " 规则"));
        if (s.grades) s.grades.forEach((g) => { collect(g.define, g.level); collect(g.quick, g.level); collect(g.detail, g.level); collect(g.rate, g.level); });
        if (s.doc) s.doc.forEach((b) => { collect(b.p, b.h || b.sub); if (b.list) b.list.forEach((x) => collect(x, b.h || b.sub)); if (b.kv) b.kv.forEach((k) => { collect(k[1], k[0]); }); });
      });
    });
    let body;
    if (!hits.length) {
      body = '<div class="hero"><p class="big">🔍 没有找到 “' + esc(q) + '”</p><p class="lead">试试：单开、通开、摔箱、关键缺陷、CE、UL、卡顿、电镀 ……</p></div>';
    } else {
      body =
        '<div class="crumbs"><a href="#/home">首页</a> / 搜索结果</div>' +
        '<div class="page-head"><h2>🔍 “' + esc(q) + '” 的搜索结果</h2><p>共 ' + hits.length + " 条命中，已跨全部品类检索</p></div>" +
        hits.slice(0, 80)
          .map((h) => {
            const t = esc(h.text).replace(/\n/g, "<br>");
            const re = new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")", "ig");
            const hi = t.replace(re, "<mark>$1</mark>");
            return (
              '<a class="cat-card" href="#/' + h.cat.key + '" style="margin-bottom:14px"><span class="ic" style="font-size:22px">' +
              h.cat.ic + "</span><h3 style=\"font-size:14px\">" + esc(h.ctx) + "</h3><p>" +
              hi + "</p></a>"
            );
          })
          .join("");
    }
    view.innerHTML = body;
    document.title = "搜索：" + q + " · 质检培训看板";
  }

  // ---- 路由 ----
  const routes = { home: homePage, lock: categoryPage, light: categoryPage, track: categoryPage, standard: standardPage };
  function router() {
    const hash = location.hash.replace(/^#\/?/, "");
    const q = document.getElementById("searchBox").value.trim();
    // 高亮 tab
    document.querySelectorAll(".tab").forEach((t) =>
      t.classList.toggle("active", t.dataset.route === hash));
    if (q && hash !== "search") {
      // 保留搜索框内容但不强制搜索页
    }
    if (hash === "search") {
      searchPage(q);
      return;
    }
    const fn = routes[hash];
    if (fn) {
      if (hash === "home") fn();
      else fn(hash);
    } else {
      location.hash = "#/home";
    }
    window.scrollTo(0, 0);
  }

  // 搜索框：回车跳转搜索页，清空回首页
  const box = document.getElementById("searchBox");
  box.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      const v = box.value.trim();
      if (v) { location.hash = "#/search"; router(); }
    }
  });
  box.addEventListener("input", () => {
    if (!box.value.trim() && location.hash.replace(/^#\/?/, "") === "search") {
      location.hash = "#/home";
    }
  });

  if (verEl) verEl.textContent = "· " + D.meta.version;
  window.addEventListener("hashchange", router);
  if (!location.hash) location.hash = "#/home";
  router();
})();

</script>
</body>
</html>
